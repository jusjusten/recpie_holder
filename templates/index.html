<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Recipe Sorter - Login</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="card">
        <h1>Recipe Sorter</h1>
        <p class="muted">Sign in with any username for now.</p>
        <form id="login-form">
          <label for="user-id">Username</label>
          <input id="user-id" name="user-id" type="text" autocomplete="username" required />
          <button type="submit">Continue</button>
        </form>
      </section>
    </main>
    <script src="/static/app.js"></script>
  </body>
</html>
